<body>

<script>
    // ======================= 完整店铺数据 =======================

    // 坐标围绕长洲码头(22.2085,114.0285)及周边街道进行精确定位

        { id:1, name:"东源小食店", nameEn:"Dongyuan Fishball", address:"长洲新兴街 (码头左侧)", lat:22.2089,lng:114.0287, dishes:["招牌大鱼蛋 13HKD/2粒","劲辣咖喱","黑椒味"], price:"13-20HKD", payment:"只收现金", tips:"Q弹入味，下午4点前关门，小红书封神" },
        { id:2, name:"长洲平记", address:"长洲北社海傍路19A号地铺", lat:22.2085,lng:114.0283, dishes:["芒果糯米糍 17HKD","榴莲糯米糍","芒果肠粉"], price:"15-25HKD", payment:"八达通/现金", tips:"皮薄馅大，整颗芒果，必吃糯米糍" },
        { id:3, name:"允升甜品", address:"长洲新兴街5号地下", lat:22.2090,lng:114.0285, dishes:["芒果糯米糍(元祖)","杨枝甘露","芒果奶冻"], price:"15-35HKD", payment:"现金", tips:"糯米糍始祖，设低消15HKD" },
        { id:4, name:"陈通记", address:"长洲大兴堤路2号熟食中心13号舖", lat:22.2082,lng:114.0280, dishes:["沙爹牛肉米通 44HKD","沙爹牛肉公仔面","西多士"], price:"30-55HKD", payment:"只收现金", tips:"沙爹汤底浓郁花生粒，港式老字号" },
        { id:5, name:"长洲冰室", address:"长洲北社海旁19C号地下", lat:22.2087,lng:114.0279, dishes:["泰式奶茶三色圆冰 70HKD","芒果血糯米圆子","仙草挫冰"], price:"30-75HKD", payment:"支付宝/现金", tips:"泰奶冰一绝，文青风避暑" },
        { id:6, name:"故乡茶寮", address:"长洲教堂路17号地下", lat:22.2092,lng:114.0277, dishes:["红豆饼 6HKD","日式手卷18-28HKD"], price:"6-30HKD", payment:"现金", tips:"日本夫妇经营，红豆饼外脆内香" },
        { id:7, name:"康兰饼店", address:"长洲海傍道91号B地下", lat:22.2080,lng:114.0290, dishes:["一口蛋挞/椰挞 15HKD/6个","平安包 11HKD"], price:"10-20HKD", payment:"现金", tips:"怀旧饼店，平安包寓意平安健康" },
        { id:8, name:"长洲角酪", address:"长洲新兴街78号地铺", lat:22.2090,lng:114.0286, dishes:["莓莓角酪","芒芒角酪","紫薯角酪"], price:"28-48HKD", payment:"八达通/现金", tips:"网红打卡墙「長洲」地铁风格" },
        { id:9, name:"町町 (日式猫定食)", address:"长洲大新海傍街82号", lat:22.2086,lng:114.0289, dishes:["日式照烧鸡定食 69HKD","咖喱猪扒饭","猫主题甜品"], price:"60-90HKD", payment:"现金", tips:"猫咪主题餐厅，正餐避雨好选择" },
        { id:10, name:"新康记菜馆", address:"长洲北社海傍道11A号地铺", lat:22.2084,lng:114.0281, dishes:["海鲜套餐 278HKD/3款","避风塘炒蟹","椒盐濑尿虾"], price:"150-400HKD", payment:"现金", tips:"可讲价送米粉，海鲜新鲜性价比高" },
        { id:11, name:"张记鱼蛋粉", address:"长洲新兴街口 (近码头)", lat:22.2083,lng:114.0284, dishes:["鱼蛋墨丸双拼面","招牌炸鱼皮"], price:"25-45HKD", payment:"现金", tips:"汤底鲜甜，地道鱼蛋粉" },
        { id:12, name:"伟记面家", address:"长洲码头右转50米", lat:22.2084,lng:114.0280, dishes:["牛三宝面","云吞面","牛腩面"], price:"30-50HKD", payment:"现金", tips:"四刷博主推荐，牛腩软烂" },
        { id:13, name:"莲香餐厅", address:"长洲街市巷内 (近东源对面)", lat:22.2088,lng:114.0282, dishes:["沙爹牛肉公仔面","滑蛋虾仁饭"], price:"35-55HKD", payment:"现金", tips:"沙爹牛肉好吃到起飞" },
        { id:14, name:"鸡屎藤砵仔糕 (阿婆档)", address:"海景楼金兴餐厅门口 (码头附近)", lat:22.2089,lng:114.0275, dishes:["鸡屎藤砵仔糕(花生馅)","红豆砵仔糕"], price:"8-15HKD", payment:"现金", tips:"传统手工小吃，每日中午后开档" },
        { id:15, name:"大肠洲 Pizza & 义式", address:"长洲教堂路附近", lat:22.2091,lng:114.0280, dishes:["手工pizza 28HKD/个","炸鸡","意面"], price:"28-70HKD", payment:"现金", tips:"变装皇后开的店，pizza便宜好吃" },
        { id:16, name:"可口糯米糍", address:"长洲新兴后街 (近码头东侧)", lat:22.2088,lng:114.0288, dishes:["芒果糯米糍 13HKD","榴莲糯米糍"], price:"13-20HKD", payment:"现金", tips:"皮薄馅多，性价比高，甜而不腻" },
        { id:17, name:"炸雪糕 (新兴后街小摊)", address:"长洲新兴后街 (近食来食坊旧址)", lat:22.2090,lng:114.0284, dishes:["炸雪糕 25HKD/2颗","外酥里冰"], price:"20-30HKD", payment:"现金", tips:"外热内冰，口感新奇" },
        { id:18, name:"Phong Cách Việt 越南河粉", address:"长洲北社街 (近码头北侧)", lat:22.2086,lng:114.0278, dishes:["火车头越南河粉","越式法包"], price:"45-70HKD", payment:"现金", tips:"比九记牛腩还好吃的越南粉" },
        { id:19, name:"长洲海鲜大排档 (海边档口)", address:"长洲北社海傍路海鲜街", lat:22.2085,lng:114.0280, dishes:["蒜蓉蒸蛏子","豉椒炒花甲","椒盐濑尿虾"], price:"200-400HKD", payment:"现金", tips:"海边大排档，傍晚吹海风吃海鲜" },
        { id:20, name:"长洲泰式料理 (Thai)", address:"长洲东湾路附近", lat:22.2082,lng:114.0292, dishes:["泰式炒河","冬阴功汤","泰式奶茶"], price:"50-80HKD", payment:"现金/八达通", tips:"味道正宗，人均70HKD左右" },
        { id:21, name:"甘永泰鱼蛋 (已结业⚠️)", address:"长洲新兴街", lat:22.2088,lng:114.0285, dishes:["大鱼蛋(已结业勿跑空)"], price:"-", payment:"-", tips:"目前已关门，替代选东源", isClosed:true },
        { id:22, name:"长洲糯米糍 (路边小铺)", address:"长洲码头右侧小巷", lat:22.2085,lng:114.0282, dishes:["花生糯米糍","芝麻糯米糍"], price:"10-15HKD", payment:"现金", tips:"随意小店，平记更佳" },
        { id:23, name:"时来食坊 (避雷⚠️鱼蛋难吃)", address:"长洲码头左转", lat:22.2089,lng:114.0286, dishes:["大鱼蛋(不推荐)"], price:"12HKD", payment:"现金", tips:"网友反馈又小又难吃，建议避开" },
        { id:24, name:"长洲华威酒店中餐厅", address:"长洲东湾", lat:22.2078,lng:114.0305, dishes:["粤式点心","海鲜套餐"], price:"100-300HKD", payment:"信用卡/现金", tips:"海景餐厅，适合雨天室内用餐" },
        { id:25, name:"林记煲仔饭 (广州长洲岛，不属于香港)", address:"广州黄埔区", lat:0,lng:0, hidden:true }, // 隐藏，广州店不显示
        { id:26, name:"姚林轩 (广州店)", address:"广州黄埔", lat:0,lng:0, hidden:true },
        { id:27, name:"红虹小食 (广州)", address:"广州黄埔", lat:0,lng:0, hidden:true }
    ];
    
    // 过滤出香港长洲岛有效店铺 (排除广州、排除隐藏)
    let shopsData = fullShops.filter(s => !s.hidden && s.lat !== 0 && s.lng !== 0 && s.id !== 21 && s.id !== 23); // 甘永泰关门不显示，时来食坊避雷可选保留但可展示但标注
    // 手动再补两个遗漏的推荐：长洲沙爹牛肉面（陈通记已有），长洲角酪已有，再加一个长洲“大可以滋补馆” (CSV出现)
    shopsData.push({ id:28, name:"大可以滋补馆", address:"长洲金洲北路? (近街市)", lat:22.2087,lng:114.0289, dishes:["支柱牛杂煲","滋补汤品"], price:"60-120HKD", payment:"现金", tips:"牛杂煲很可以，本地人爱去" });
    shopsData.push({ id:29, name:"长洲德膳山庄 (广州店已排除，此为香港长洲无)", hidden:true });
    // 真实增加“长洲糯米糍 (允升/平记已有) 但加上允升已包含”
    // 添加“长洲东南亚菜(印度菜)”无具体名，不添加以免误导。加上“长洲新锦记(平安包)”
    shopsData.push({ id:30, name:"新锦记", address:"长洲北社街", lat:22.2085,lng:114.0279, dishes:["平安包","豆沙包"], price:"10-15HKD", payment:"现金", tips:"平安包图个好意头" });
    // 最终清理重复及去除广州店
    shopsData = shopsData.filter(s => s.id !== 25 && s.id !== 26 && s.id !== 27 && !s.hidden);
    
    // 用户位置：长洲新北社街 (精确)
    let userLat = 22.2093;
    let userLng = 114.0282;
    let userAddress = "长洲新北社街 (您当前附近)";
    
    // 辅助函数：计算距离(米)
    function distanceToUser(lat, lng) {
        const R = 6371000;
        const dLat = (lat - userLat) * Math.PI / 180;
        const dLng = (lng - userLng) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(userLat * Math.PI/180) * Math.cos(lat * Math.PI/180) * Math.sin(dLng/2)**2;
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }
    
    function formatDistance(m) {
        if (m < 1000) return `${Math.round(m)}米`;
        return `${(m/1000).toFixed(1)}公里`;
    }
    function walkTime(minutes) { let mins = Math.round(minutes); return mins <= 1 ? "约1分钟" : `约${mins}分钟`; }
    
    // 给每个店添加动态距离字段
    function updateShopDistances() {
        return shopsData.map(shop => {
            const distM = distanceToUser(shop.lat, shop.lng);
            const walkMins = Math.ceil(distM / 70);
            return { ...shop, distanceMeters: distM, walkMinutes: walkMins };
        });
    }
    
    let currentShops = updateShopDistances();
    let currentSort = "distance";
    let searchKeyword = "";
    
    function filterAndSort() {
        let filtered = currentShops.filter(shop => {
            if (!searchKeyword) return true;
            const kw = searchKeyword.toLowerCase();
            return shop.name.toLowerCase().includes(kw) ||
                   shop.dishes.some(d => d.toLowerCase().includes(kw)) ||
                   shop.address.toLowerCase().includes(kw) ||
                   (shop.tips && shop.tips.toLowerCase().includes(kw));
        });
        if (currentSort === "distance") {
            filtered.sort((a,b) => a.distanceMeters - b.distanceMeters);
        } else {
            filtered.sort((a,b) => a.name.localeCompare(b.name, 'zh'));
        }
        return filtered;
    }
    
    // 渲染列表 + 绑定地图按钮事件
    let map;
    let markersLayer;
    let userMarker;
    
    function renderShopList() {
        const list = filterAndSort();
        const container = document.getElementById("shopListPanel");
        if (!container) return;
        if (list.length === 0) {
            container.innerHTML = `<div class="no-results"><i class="fas fa-umbrella"></i> 没有找到相关店铺，换个关键词试试～</div>`;
            return;
        }
        let html = "";
        list.forEach(shop => {
            const distText = formatDistance(shop.distanceMeters);
            const timeText = walkTime(shop.walkMinutes);
            const dishesHtml = shop.dishes.map(d => `<span class="dish-tag">${d}</span>`).join('');
            const rainPreferred = shop.distanceMeters < 450 ? `<span class="rain-tag"><i class="fas fa-umbrella"></i> 躲雨优选</span>` : '';
            html += `
                <div class="shop-card" data-id="${shop.id}" data-lat="${shop.lat}" data-lng="${shop.lng}" data-name="${shop.name}">
                    <div class="shop-header">
                        <div class="shop-name"><i class="fas fa-store"></i> ${shop.name}</div>
                        <span class="distance-badge"><i class="fas fa-walking"></i> ${distText} · ${timeText}</span>
                        ${rainPreferred}
                    </div>
                    <div class="dish-list">${dishesHtml}</div>
                    <div class="address"><i class="fas fa-location-dot"></i> ${shop.address}</div>
                    <div class="info-row">
                        <span><i class="fas fa-tag"></i> ${shop.price}</span>
                        <span><i class="fas fa-coins"></i> ${shop.payment}</span>
                    </div>
                    <div class="info-row"><i class="fas fa-comment"></i> ${shop.tips.substring(0, 55)}${shop.tips.length>55?'...':''}</div>
                    <button class="map-mini-btn view-on-map" data-lat="${shop.lat}" data-lng="${shop.lng}" data-name="${shop.name}">
                        <i class="fas fa-map-marker-alt"></i> 在地图中查看
                    </button>
                </div>
            `;
        });
        container.innerHTML = html;
        // 绑定地图查看按钮
        document.querySelectorAll('.view-on-map').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const lat = parseFloat(btn.dataset.lat);
                const lng = parseFloat(btn.dataset.lng);
                const name = btn.dataset.name;
                if (map) {
                    map.flyTo([lat, lng], 17);
                    L.popup().setLatLng([lat, lng]).setContent(`<b>${name}</b><br>📍 点击下方导航可规划步行路线`).openOn(map);
                }
            });
        });
        // 卡片整体点击跳转地图
        document.querySelectorAll('.shop-card').forEach(card => {
            card.addEventListener('click', (e) => {
                if(e.target.classList.contains('view-on-map')) return;
                const lat = parseFloat(card.dataset.lat);
                const lng = parseFloat(card.dataset.lng);
                const name = card.dataset.name;
                if (map) {
                    map.flyTo([lat, lng], 16);
                    L.popup().setLatLng([lat, lng]).setContent(`<b>${name}</b><br>距离您 ${formatDistance(distanceToUser(lat,lng))}`).openOn(map);
                }
            });
        });
    }
    
    function updateMapMarkers() {
        if (!map) return;
        markersLayer.clearLayers();
        const list = filterAndSort();
        list.forEach(shop => {
            const marker = L.marker([shop.lat, shop.lng]).bindPopup(`
                <strong>${shop.name}</strong><br>
                📍 ${shop.address}<br>
                🍜 ${shop.dishes.join(' · ')}<br>
                💰 ${shop.price} · ${shop.payment}<br>
                🚶 距离您 ${formatDistance(shop.distanceMeters)} (步行${walkTime(shop.walkMinutes)})<br>
                ✨ ${shop.tips}
            `);
            markersLayer.addLayer(marker);
        });
        markersLayer.addTo(map);
        if (userMarker) map.removeLayer(userMarker);
        userMarker = L.marker([userLat, userLng], {
            icon: L.divIcon({ className: 'user-marker', html: '<i class="fas fa-map-pin" style="font-size:28px; color:#e34d3a; text-shadow:0 0 2px white;"></i>', iconSize: [24,24], popupAnchor: [0,-10] })
        }).bindPopup(`<b>📍 我的位置</b><br>${userAddress}<br>☔️ 下雨路滑，注意安全`).addTo(map);
    }
    
    function refreshAll() {
        currentShops = updateShopDistances();
        renderShopList();
        updateMapMarkers();
    }
    
    function initMap() {
        map = L.map('map').setView([userLat, userLng], 15);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
            attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a> & CartoDB',
            maxZoom: 19
        }).addTo(map);
        markersLayer = L.layerGroup().addTo(map);
        userMarker = L.marker([userLat, userLng]).bindPopup("长洲新北社街").addTo(map);
        updateMapMarkers();
        map.on('click', () => {});
    }
    
    // 获取真实地理位置（仅当在长洲岛附近更新）
    function getRealLocation() {
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(pos => {
                const rlat = pos.coords.latitude;
                const rlng = pos.coords.longitude;
                if (rlat > 22.19 && rlat < 22.22 && rlng > 114.01 && rlng < 114.05) {
                    userLat = rlat;
                    userLng = rlng;
                    userAddress = "您的实时位置 (长洲岛内)";
                } else {
                    alert("未检测到您在长洲岛内，使用新北社街默认位置");
                }
                refreshAll();
                if (map) map.flyTo([userLat, userLng], 15);
            }, () => alert("无法获取位置，使用默认位置"));
        } else {
            alert("浏览器不支持定位");
        }
    }
    
    // 事件绑定
    document.addEventListener('DOMContentLoaded', () => {
        initMap();
        refreshAll();
        const searchInput = document.getElementById('searchInput');
        searchInput.addEventListener('input', (e) => {
            searchKeyword = e.target.value;
            refreshAll();
        });
        const sortDist = document.querySelector('[data-sort="distance"]');
        const sortName = document.querySelector('[data-sort="name"]');
        sortDist.addEventListener('click', () => {
            currentSort = "distance";
            sortDist.classList.add('active');
            sortName.classList.remove('active');
            refreshAll();
        });
        sortName.addEventListener('click', () => {
            currentSort = "name";
            sortName.classList.add('active');
            sortDist.classList.remove('active');
            refreshAll();
        });
        const recenterBtn = document.getElementById('recenterBtn');
        recenterBtn.addEventListener('click', () => {
            getRealLocation();
        });
        setTimeout(() => { if(map) map.flyTo([userLat, userLng], 15); }, 600);
    });
</script>
</body>
</html>
