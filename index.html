        { id:11, name:"张记鱼蛋粉", address:"长洲新兴街口 (近码头)", lat:22.2083,lng:114.0284, dishes:["鱼蛋墨丸双拼面","招牌炸鱼皮"], price:"25-45 HKD", payment:"现金", tips:"汤底鲜甜，鱼蛋粉地道老字号" },

        { id:13, name:"莲香餐厅", address:"长洲街市巷内 (近东源对面)", lat:22.2088,lng:114.0282, dishes:["沙爹牛肉公仔面","滑蛋虾仁饭"], price:"35-55 HKD", payment:"现金", tips:"沙爹牛肉好吃到起飞，烟火气十足" },
        { id:14, name:"鸡屎藤砵仔糕 (阿婆档)", address:"海景楼金兴餐厅门口 (码头附近)", lat:22.2089,lng:114.0275, dishes:["鸡屎藤砵仔糕(花生馅)","红豆砵仔糕"], price:"8-15 HKD", payment:"现金", tips:"传统手工小吃，每日中午后开档，软糯香甜" },

        { id:17, name:"炸雪糕小摊", address:"长洲新兴后街 (近食来食坊旧址)", lat:22.2090,lng:114.0284, dishes:["炸雪糕 25HKD/2颗","外酥里冰"], price:"20-30 HKD", payment:"现金", tips:"外热内冰，新奇口感，饭后甜点" },
        { id:18, name:"Phong Cách Việt 越南河粉", address:"长洲北社街 (近码头北侧)", lat:22.2086,lng:114.0278, dishes:["火车头越南河粉","越式法包"], price:"45-70 HKD", payment:"现金", tips:"越南粉比九记牛腩还好吃，汤头惊艳" },
        { id:19, name:"长洲海鲜大排档 (海边档口)", address:"长洲北社海傍路海鲜街", lat:22.2085,lng:114.0280, dishes:["蒜蓉蒸蛏子","豉椒炒花甲","椒盐濑尿虾"], price:"200-400 HKD", payment:"现金", tips:"海边大排档，傍晚吹海风吃海鲜" },
        { id:20, name:"长洲泰式料理 (Thai Kitchen)", address:"长洲东湾路附近", lat:22.2082,lng:114.0292, dishes:["泰式炒河","冬阴功汤","泰式奶茶"], price:"50-80 HKD", payment:"现金/八达通", tips:"味道正宗，人均70HKD，泰奶好喝" },
        { id:21, name:"新锦记", address:"长洲北社街", lat:22.2085,lng:114.0279, dishes:["平安包","豆沙包"], price:"10-15 HKD", payment:"现金", tips:"平安包图个好意头，莲蓉/豆沙馅" },
        { id:22, name:"大可以滋补馆", address:"长洲金洲北路 (近街市)", lat:22.2087,lng:114.0289, dishes:["支柱牛杂煲","滋补汤品"], price:"60-120 HKD", payment:"现金", tips:"牛杂煲很可以，本地人爱去，暖胃" },
        { id:23, name:"华威酒店中餐厅", address:"长洲东湾", lat:22.2078,lng:114.0305, dishes:["粤式点心","海鲜套餐","避风塘炒蟹"], price:"100-300 HKD", payment:"信用卡/现金", tips:"海景餐厅，雨天室内用餐舒适" },
        { id:24, name:"长洲陈记烧鹅 (街市烧腊)", address:"长洲街市熟食档", lat:22.2083,lng:114.0283, dishes:["深井烧鹅","叉烧饭"], price:"40-70 HKD", payment:"现金", tips:"皮脆肉嫩，地道烧味" },
        { id:25, name:"长洲糯米糍小铺 (码头右转)", address:"长洲码头右侧小巷", lat:22.2085,lng:114.0282, dishes:["花生糯米糍","芝麻糯米糍"], price:"10-15 HKD", payment:"现金", tips:"随意小店，软糯香甜" }
    ];

    // 用户位置默认：长洲新北社街（精确）
    let userLat = 22.2093;
    let userLng = 114.0282;
    let userAddress = "长洲新北社街 (默认)";
    let shops = [...SHOPS_RAW];
    
    // 辅助函数：计算两点距离（米）
    function distanceToUser(lat, lng) {
        const R = 6371000;
        const dLat = (lat - userLat) * Math.PI / 180;
        const dLng = (lng - userLng) * Math.PI / 180;
        const a = Math.sin(dLat/2)**2 + Math.cos(userLat * Math.PI/180) * Math.cos(lat * Math.PI/180) * Math.sin(dLng/2)**2;
        const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
        return R * c;
    }
    
    function formatDistance(meters) {
        if (meters < 1000) return `${Math.round(meters)}米`;
        return `${(meters/1000).toFixed(1)}公里`;
    }
    function walkTime(minutes) {
        const mins = Math.round(minutes);
        return mins <= 1 ? "约1分钟" : `约${mins}分钟`;
    }
    
    // 给每个店铺添加距离信息
    function enrichShopsWithDistance() {
        return shops.map(shop => {
            const distM = distanceToUser(shop.lat, shop.lng);
            const walkMins = Math.ceil(distM / 70);
            return { ...shop, distanceMeters: distM, walkMinutes: walkMins };
        });
    }
    
    let currentShops = enrichShopsWithDistance();
    let currentSort = "distance";
    let searchKeyword = "";
    
    // 过滤 + 排序
    function getFilteredAndSorted() {
        let filtered = currentShops.filter(shop => {
            if (!searchKeyword) return true;
            const kw = searchKeyword.toLowerCase();
            return shop.name.toLowerCase().includes(kw) ||
                   shop.dishes.some(d => d.toLowerCase().includes(kw)) ||
                   shop.address.toLowerCase().includes(kw) ||
                   (shop.tips && shop.tips.toLowerCase().includes(kw));
        });
        if (currentSort === "distance") {
            filtered.sort((a,b) => a.distanceMeters - b.distanceMeters);
        } else {
            filtered.sort((a,b) => a.name.localeCompare(b.name, 'zh'));
        }
        return filtered;
    }
    
    // 唤起苹果地图 (iOS 系统地图)
    function openAppleMaps(shop) {
        // 使用 maps.apple.com 通用 scheme，支持 iOS/macOS，自动跳转系统地图
        // 编码地址和坐标，确保准确
        const query = encodeURIComponent(`${shop.name}, 香港长洲岛 ${shop.address}`);
        // 最佳方式：直接使用坐标打开导航 "maps://?q=纬度,经度&ll=纬度,经度"
        // 为了更好的体验，同时传入名称和坐标
        const url = `https://maps.apple.com/?q=${shop.lat},${shop.lng}&address=${encodeURIComponent(shop.address)}&ll=${shop.lat},${shop.lng}`;
        // 使用 window.location 跳转
        window.location.href = url;
    }
    
    // 渲染列表
    function renderList() {
        const container = document.getElementById("shopListContainer");
        const statsSpan = document.getElementById("statsInfo");
        const filteredList = getFilteredAndSorted();
        
        if (!container) return;
        if (filteredList.length === 0) {
            container.innerHTML = `<div class="no-results"><i class="fas fa-umbrella"></i> 没有找到相关店铺，换个关键词试试～</div>`;
            statsSpan.innerHTML = `<span><i class="fas fa-utensils"></i> 0 家店铺</span><span><i class="fas fa-map-marker-alt"></i> 已定位</span>`;
            return;
        }
        
        let html = "";
        filteredList.forEach(shop => {
            const distText = formatDistance(shop.distanceMeters);
            const timeText = walkTime(shop.walkMinutes);
            const dishesHtml = shop.dishes.map(d => `<span class="dish-tag">${d}</span>`).join('');
            const rainPreferred = shop.distanceMeters < 450 ? `<span class="rain-tag"><i class="fas fa-umbrella"></i> 躲雨优选</span>` : '';
            // 综合评分(伪) 用热度表示
            const hotness = shop.id % 5 + 4; // 随机模仿评分4~8分
            const starHtml = '<i class="fas fa-star" style="color:#fbbf24; font-size:0.7rem;"></i>'.repeat(Math.min(5, Math.floor(hotness/1.5))) + `<span style="margin-left:4px;">${hotness}.0分</span>`;
            html += `
                <div class="shop-card" data-id="${shop.id}">
                    <div class="shop-header">
                        <div class="shop-name">
                            <i class="fas fa-store"></i> ${shop.name}
                            ${starHtml}
                        </div>
                        <span class="distance-badge"><i class="fas fa-walking"></i> ${distText} · ${timeText}</span>
                        ${rainPreferred}
                    </div>
                    <div class="dish-list">${dishesHtml}</div>
                    <div class="address"><i class="fas fa-location-dot"></i> ${shop.address}</div>
                    <div class="info-row">
                        <span><i class="fas fa-tag"></i> ${shop.price}</span>
                        <span><i class="fas fa-coins"></i> ${shop.payment}</span>
                    </div>
                    <div class="comment"><i class="fas fa-comment-dots"></i> ${shop.tips}</div>
                    <button class="map-link-btn" data-id="${shop.id}">
                        <i class="fab fa-apple"></i> 苹果地图导航
                    </button>
                </div>
            `;
        });
        container.innerHTML = html;
        
        // 绑定按钮点击事件
        document.querySelectorAll('.map-link-btn').forEach(btn => {
            btn.addEventListener('click', (e) => {
                e.stopPropagation();
                const shopId = parseInt(btn.dataset.id);
                const shopItem = filteredList.find(s => s.id === shopId);
                if (shopItem) {
                    openAppleMaps(shopItem);
                }
            });
        });
        
        // 更新统计信息
        statsSpan.innerHTML = `<span><i class="fas fa-utensils"></i> ${filteredList.length} 家美食店</span><span><i class="fas fa-map-marker-alt"></i> ${userAddress}</span>`;
    }
    
    // 刷新所有数据（距离变化后重新计算并渲染）
    function refreshAll() {
        currentShops = enrichShopsWithDistance();
        renderList();
    }
    
    // 获取用户真实位置（如果允许且位于长洲岛附近）
    function updateUserLocation() {
        if ("geolocation" in navigator) {
            navigator.geolocation.getCurrentPosition(
                (position) => {
                    const realLat = position.coords.latitude;
                    const realLng = position.coords.longitude;
                    // 校验是否在长洲岛范围内 (纬度约22.195~22.215, 经度114.02~114.04)
                    if (realLat > 22.19 && realLat < 22.22 && realLng > 114.01 && realLng < 114.05) {
                        userLat = realLat;
                        userLng = realLng;
                        userAddress = "您的实时位置 (长洲岛内)";
                    } else {
                        // 不在长洲岛则保持默认，并提示
                        userAddress = "长洲新北社街 (模拟位置)";
                        console.log("定位不在长洲岛，使用默认坐标");
                    }
                    refreshAll();
                    // 更新stats显示
                    const statsSpan = document.getElementById("statsInfo");
                    if(statsSpan) statsSpan.innerHTML = `<span><i class="fas fa-utensils"></i> 加载中...</span><span><i class="fas fa-map-marker-alt"></i> ${userAddress}</span>`;
                    setTimeout(() => {
                        renderList();
                    }, 50);
                },
                (error) => {
                    console.warn("定位失败", error);
                    userAddress = "长洲新北社街 (定位未授权)";
                    refreshAll();
                }
            );
        } else {
            userAddress = "长洲新北社街 (不支持定位)";
            refreshAll();
        }
    }
    
    // 手动重置定位按钮
    function manualRelocate() {
        updateUserLocation();
    }
    
    // 事件绑定与搜索排序
    document.addEventListener('DOMContentLoaded', () => {
        // 初始化定位
        updateUserLocation();
        
        const searchInput = document.getElementById('searchInput');
        const sortDistance = document.querySelector('[data-sort="distance"]');
        const sortName = document.querySelector('[data-sort="name"]');
        const recenterBtn = document.getElementById('recenterBtn');
        
        searchInput.addEventListener('input', (e) => {
            searchKeyword = e.target.value;
            renderList();
        });
        
        sortDistance.addEventListener('click', () => {
            currentSort = "distance";
            sortDistance.classList.add('active');
            sortName.classList.remove('active');
            renderList();
        });
        
        sortName.addEventListener('click', () => {
            currentSort = "name";
            sortName.classList.add('active');
            sortDistance.classList.remove('active');
            renderList();
        });
        
        recenterBtn.addEventListener('click', () => {
            manualRelocate();
        });
    });
</script>
</body>
</html>
